<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Drug Compatibility & Stability</title>
<style>
  :root {
    --c-teal: #0F6E56; --c-teal-light: #E1F5EE; --c-teal-mid: #1D9E75; --c-teal-dark: #085041;
    --c-amber: #BA7517; --c-amber-light: #FAEEDA; --c-red: #A32D2D; --c-red-light: #FCEBEB;
    --c-blue: #185FA5; --c-blue-light: #E6F1FB; --c-purple: #534AB7; --c-purple-light: #EEEDFE;
    --c-gray: #5F5E5A; --c-gray-light: #F1EFE8; --c-gray-border: #D3D1C7;
    --bg: #f7f7f5; --surface: #ffffff; --text: #1a1a18; --text-muted: #5F5E5A;
    --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* Header */
  #app-header { background: var(--c-teal-dark); padding: 20px 24px 16px; }
  #app-header h1 { color: #fff; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  #app-header p { color: #9FE1CB; font-size: 12px; margin-top: 3px; }

  /* Search & Filters */
  #controls { background: var(--surface); border-bottom: 1px solid var(--c-gray-border); padding: 12px 24px; position: sticky; top: 0; z-index: 100; }
  #search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--c-gray-border); border-radius: 8px; padding: 7px 12px; margin-bottom: 10px; }
  #search-box svg { flex-shrink: 0; color: var(--text-muted); }
  #search-box input { border: none; background: transparent; font-size: 14px; color: var(--text); outline: none; width: 100%; }
  #search-box input::placeholder { color: var(--text-muted); }

  #cat-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--c-gray-border); background: transparent; font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
  .cat-btn.active { background: var(--c-teal); border-color: var(--c-teal); color: #fff; font-weight: 500; }
  .cat-btn:hover:not(.active) { background: var(--c-gray-light); }

  /* Stats */
  #stats-bar { padding: 8px 24px; display: flex; gap: 16px; background: var(--c-gray-light); border-bottom: 1px solid var(--c-gray-border); }
  .stat-item { font-size: 12px; color: var(--text-muted); }
  .stat-item strong { color: var(--text); }

  /* Drug Grid */
  #drug-grid { padding: 16px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  #no-results { text-align: center; padding: 60px 24px; color: var(--text-muted); display: none; }
  #no-results svg { margin-bottom: 12px; opacity: 0.3; }

  /* Drug Card */
  .drug-card { background: var(--surface); border: 1px solid var(--c-gray-border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .drug-card:hover { border-color: var(--c-teal-mid); box-shadow: 0 2px 12px rgba(15,110,86,0.12); transform: translateY(-1px); }
  .drug-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .drug-card.cat-antibiotic::before { background: var(--c-teal); }
  .drug-card.cat-nonantibiotic::before { background: var(--c-blue); }
  .drug-card.cat-electrolyte::before { background: var(--c-amber); }
  .drug-card.cat-vasoactive::before { background: var(--c-red); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .drug-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .drug-generic { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 1px; }
  .subcat-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-antibiotic { background: var(--c-teal-light); color: var(--c-teal-dark); }
  .badge-nonantibiotic { background: var(--c-blue-light); color: var(--c-blue); }
  .badge-electrolyte { background: var(--c-amber-light); color: var(--c-amber); }
  .badge-vasoactive { background: var(--c-red-light); color: var(--c-red); }
  .badge-sedative { background: var(--c-purple-light); color: var(--c-purple); }

  .card-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 11px; }
  .info-item { background: var(--bg); border-radius: 6px; padding: 6px 8px; }
  .info-label { color: var(--text-muted); font-size: 10px; margin-bottom: 2px; }
  .info-value { color: var(--text); line-height: 1.3; }
  .info-value.highlight { color: var(--c-teal); font-weight: 500; }

  .card-warnings { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .warn-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; }
  .warn-ysiteblock { background: #FCEBEB; color: #A32D2D; }
  .warn-pregnancy { background: #EEEDFE; color: #534AB7; }
  .warn-light { background: #FAEEDA; color: #BA7517; }
  .warn-refrig { background: #E6F1FB; color: #185FA5; }

  .card-form { font-size: 11px; color: var(--text-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--bg); }

  /* Modal */
  #modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
  #modal-backdrop.open { display: flex; }
  #modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 760px; margin: auto; position: relative; }
  #modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--c-gray-border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  #modal-drug-name { font-size: 20px; font-weight: 700; color: var(--text); }
  #modal-drug-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  #modal-close { background: var(--bg); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #modal-close:hover { background: var(--c-gray-border); }
  #modal-body { padding: 20px 24px; }
  .modal-section { margin-bottom: 18px; }
  .modal-section:last-child { margin-bottom: 0; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-recon { background: var(--c-teal); }
  .dot-dilute { background: var(--c-blue); }
  .dot-admin { background: var(--c-amber); }
  .dot-stability { background: var(--c-purple); }
  .dot-notes { background: var(--c-red); }
  .section-content { font-size: 13px; color: var(--text); line-height: 1.6; background: var(--bg); border-radius: 8px; padding: 10px 14px; }
  .section-content.warning { background: var(--c-red-light); border-left: 3px solid var(--c-red); }
  .modal-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 4px; margin: 2px; }

  @media (max-width: 600px) {
    #drug-grid { grid-template-columns: 1fr; padding: 12px 16px; }
    #controls { padding: 10px 16px; }
    #app-header { padding: 16px; }
    .modal-grid2 { grid-template-columns: 1fr; }
    #modal-backdrop { padding: 10px; }
  }
</style>
</head>
<body>

<div id="app-header">
  <h1>💉 IV Drug Compatibility &amp; Stability</h1>
  <p>ข้อมูลการบริหารยาฉีด — โรงพยาบาล v.1/2566</p>
</div>

<div id="controls">

<div id="drug-grid"></div>

   dilution:"D5W หรือ NSS — ≤5 mg/mL (2.5-5 mg/mL; Max 10 mg/mL)",
   stabilityDilute:"14 วัน ในตู้เย็น",
   admin:"IV infusion: ≤10 mg/min\nDose <1 g: >60 นาที\nDose 1-2 g: >90 นาที",

// Remove duplicate Vancomycin
const seen = new Set();
const DRUG_DATA = DRUGS.filter(d => {
  const key = d.name + d.form;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

const CATEGORIES = {
  "ทั้งหมด": null,
  "Antibiotics": "Antibiotics",
  "Non-Antibiotic": "Non-Antibiotic"
};

const SUBCATS = {
  Antibiotics: ["Penicillins","Cephalosporins","BL/BLI","Carbapenems","Aminoglycosides","Fluoroquinolones","Macrolides","Lincosamides","Tetracyclines","Polymycins","Glycopeptide","Sulfonamides","Antifungal","Antiviral","Miscellaneous"],
  "Non-Antibiotic": ["Vasoactive","Antiarrhythmic","Cardiac","Calcium Channel Blocker","Beta-Blocker","Vasodilator","Diuretic","Antiepileptic","Sedative","Sedative/Anesthetic","Opioid Analgesic","Analgesic","Antiemetic","PPI","H2 Blocker","Corticosteroid","Endocrine","Electrolyte","Anticoagulant","Antifibrinolytic","Antidote","Bronchodilator","Antipsychotic","NSAID","Neuromuscular Blocker","Obstetric"]
};

let activeFilter = null;
let searchTerm = "";

function getBadgeClass(d) {
  if (d.cat === "Antibiotics") return "badge-antibiotic";
  const sub = d.subcat.toLowerCase();
  if (["vasoactive","antiarrhythmic","cardiac","calcium channel blocker","beta-blocker","vasodilator"].includes(sub)) return "badge-vasoactive";
  if (["electrolyte"].includes(sub)) return "badge-electrolyte";
  if (["sedative","sedative/anesthetic","neuromuscular blocker"].includes(sub)) return "badge-sedative";
  return "badge-nonantibiotic";
}

function getCardClass(d) {
  if (d.cat === "Antibiotics") return "cat-antibiotic";
  const sub = d.subcat.toLowerCase();
  if (["vasoactive","antiarrhythmic","vasodilator"].includes(sub)) return "cat-vasoactive";
  if (["electrolyte"].includes(sub)) return "cat-electrolyte";
  return "cat-nonantibiotic";
}

function getWarningTags(d) {
  const tags = [];
  if (d.ysite && d.ysite.length > 0) tags.push(`<span class="warn-tag warn-ysiteblock">Y-site: ห้ามกับ ${d.ysite.length} ชนิด</span>`);
  if (d.pregnancy && d.pregnancy !== "-" && d.pregnancy !== "NA") tags.push(`<span class="warn-tag warn-pregnancy">Preg Cat ${d.pregnancy}</span>`);
  if (d.warnings && d.warnings.includes("light")) tags.push(`<span class="warn-tag warn-light">ป้องกันแสง</span>`);
  if (d.warnings && d.warnings.includes("noRefrig")) tags.push(`<span class="warn-tag warn-refrig">ห้ามแช่เย็น</span>`);
  return tags.join("");
}

function renderCards(drugs) {
  const grid = document.getElementById("drug-grid");
  const noRes = document.getElementById("no-results");
  grid.innerHTML = "";
  if (drugs.length === 0) { noRes.style.display = "block"; grid.style.display = "none"; document.getElementById("count-shown").textContent = "0"; return; }
  noRes.style.display = "none";
  grid.style.display = "grid";
  document.getElementById("count-shown").textContent = drugs.length;
  drugs.forEach((d, i) => {
    const el = document.createElement("div");
    el.className = `drug-card ${getCardClass(d)}`;
    el.innerHTML = `
      <div class="card-header">
        <div><div class="drug-name">${d.name}</div><div class="drug-generic">${d.subcat}</div></div>
        <span class="subcat-badge ${getBadgeClass(d)}">${d.cat === "Antibiotics" ? d.subcat : d.cat}</span>
      </div>
      <div class="card-info">
        <div class="info-item">
          <div class="info-label">การเจือจางยา</div>
          <div class="info-value highlight">${d.dilution.split('\n')[0].substring(0,60)}${d.dilution.length>60?'…':''}</div>
        </div>
        <div class="info-item">
          <div class="info-label">ความคงตัวหลังเจือจาง</div>
          <div class="info-value">${d.stabilityDilute.split('\n')[0].substring(0,60) || '-'}</div>
        </div>
      </div>
      <div class="card-form">${d.form}</div>
      <div class="card-warnings">${getWarningTags(d)}</div>
    `;
    el.addEventListener("click", () => openModal(d));
    grid.appendChild(el);
  });
}

function getFiltered() {
  let drugs = DRUG_DATA;
  if (activeFilter) drugs = drugs.filter(d => d.cat === activeFilter);
  if (searchTerm.trim()) {
    const q = searchTerm.toLowerCase();
    drugs = drugs.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.subcat.toLowerCase().includes(q) ||
      d.form.toLowerCase().includes(q) ||
      d.dilution.toLowerCase().includes(q) ||
      d.notes.toLowerCase().includes(q)
    );
  }
  return drugs;
}

function updateStats() {
  const label = document.getElementById("active-cat-label");
  label.textContent = activeFilter ? `หมวด: ${activeFilter}` : "ทุกหมวดยา";
}

// Init filters
const filterDiv = document.getElementById("cat-filters");
Object.entries(CATEGORIES).forEach(([label, value]) => {
  const btn = document.createElement("button");
  btn.className = "cat-btn" + (value === null ? " active" : "");
  btn.textContent = label;
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = value;
    updateStats();
    renderCards(getFiltered());
  });
  filterDiv.appendChild(btn);
});

document.getElementById("search-input").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderCards(getFiltered());
});

// Modal
function openModal(d) {
  document.getElementById("modal-drug-name").textContent = d.name;
  document.getElementById("modal-drug-sub").textContent = `${d.subcat} — ${d.form}`;
  const body = document.getElementById("modal-body");
  body.innerHTML = `
    <div class="modal-grid2">
      <div class="modal-section">
        <div class="section-title"><span class="section-dot dot-recon"></span>การละลายผงยา (Reconstitution)</div>
        <div class="section-content">${d.reconstitution.replace(/\n/g,"<br>") || '<em style="color:var(--text-muted)">-</em>'}</div>
      </div>
      <div class="modal-section">
        <div class="section-title"><span class="section-dot dot-stability"></span>ความคงตัวหลังละลายผงยา</div>
        <div class="section-content">${d.stabilityRecon.replace(/\n/g,"<br>") || '<em style="color:var(--text-muted)">-</em>'}</div>
      </div>
    </div>
    <div class="modal-section">
      <div class="section-title"><span class="section-dot dot-dilute"></span>การเจือจางยา (Dilution)</div>
      <div class="section-content">${d.dilution.replace(/\n/g,"<br>")}</div>
    </div>
    <div class="modal-section">
      <div class="section-title"><span class="section-dot dot-stability"></span>ความคงตัวหลังเจือจางยา</div>
      <div class="section-content">${d.stabilityDilute.replace(/\n/g,"<br>") || '<em style="color:var(--text-muted)">-</em>'}</div>
    </div>
    <div class="modal-section">
      <div class="section-title"><span class="section-dot dot-admin"></span>การบริหารยา (Administration)</div>
      <div class="section-content">${d.admin.replace(/\n/g,"<br>")}</div>
    </div>
    ${d.ysite && d.ysite.length > 0 ? `
    <div class="modal-section">
      <div class="section-title"><span class="section-dot dot-notes"></span>⚠️ Y-site Incompatibility</div>
      <div class="section-content warning">ห้ามให้ร่วมสาย (Y-site) กับ:<br>${d.ysite.map(x=>`<span class="modal-tag" style="background:var(--c-red-light);color:var(--c-red)">${x}</span>`).join("")}</div>
    </div>` : ""}
    <div class="modal-section">
      <div class="section-title"><span class="section-dot dot-notes"></span>หมายเหตุ / ข้อควรระวัง</div>
      <div class="section-content ${d.notes.includes('⚠️') ? 'warning' : ''}">${d.notes.replace(/\n/g,"<br>")}</div>
    </div>
  `;
  document.getElementById("modal-backdrop").classList.add("open");
  document.body.style.overflow = "hidden";
}

document.getElementById("modal-close").addEventListener("click", () => {
  document.getElementById("modal-backdrop").classList.remove("open");
  document.body.style.overflow = "";
});
document.getElementById("modal-backdrop").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-backdrop")) {
    document.getElementById("modal-backdrop").classList.remove("open");
    document.body.style.overflow = "";
  }
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.getElementById("modal-backdrop").classList.remove("open");
    document.body.style.overflow = "";
  }
});

// Initial render
updateStats();
renderCards(getFiltered());
</script>
</body>
</html>
