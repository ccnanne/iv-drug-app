<title>IV Drug Compatibility & Stability — รพ.พังงา v.2566</title>
<style>
:root{
  --teal:#0F6E56;--teal-l:#E1F5EE;--teal-m:#1D9E75;--teal-d:#085041;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-b:#D3D1C7;
  --bg:#f5f5f2;--surface:#fff;--text:#1a1a18;--muted:#5F5E5A;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
#hdr{background:var(--teal-d);padding:18px 24px 14px;}
#hdr h1{color:#fff;font-size:19px;font-weight:700;letter-spacing:-.3px;}
#hdr p{color:#9FE1CB;font-size:11px;margin-top:3px;}
#ctrl{background:var(--surface);border-bottom:1px solid var(--gray-b);padding:10px 24px;position:sticky;top:0;z-index:100;}
#sb{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--gray-b);border-radius:8px;padding:6px 12px;margin-bottom:8px;}
#sb input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;width:100%;}
#sb input::placeholder{color:var(--muted);}
#cats{display:flex;gap:5px;flex-wrap:wrap;}
.cb{padding:3px 11px;border-radius:20px;border:1px solid var(--gray-b);background:transparent;font-size:11px;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .12s;}
.cb.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600;}
.cb:hover:not(.on){background:var(--gray-l);}
#sbar{padding:6px 24px;display:flex;gap:16px;background:var(--gray-l);border-bottom:1px solid var(--gray-b);font-size:11px;color:var(--muted);}
#sbar strong{color:var(--text);}
#grid{padding:14px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;}
#nores{text-align:center;padding:60px;color:var(--muted);display:none;}
.dc{background:var(--surface);border:1px solid var(--gray-b);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .13s;position:relative;overflow:hidden;}
.dc:hover{border-color:var(--teal-m);box-shadow:0 2px 12px rgba(15,110,86,.12);transform:translateY(-1px);}
.dc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.dc.ca::before{background:var(--teal);}
.dc.cn::before{background:var(--blue);}
.dc.ce::before{background:var(--amber);}
.dc.cv::before{background:var(--red);}
.dc.cs::before{background:var(--purple);}
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:7px;}
.dn{font-size:13px;font-weight:600;line-height:1.3;}
.ds{font-size:10px;color:var(--muted);font-style:italic;margin-top:1px;}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.ba{background:var(--teal-l);color:var(--teal-d);}
.bn{background:var(--blue-l);color:var(--blue);}
.be{background:var(--amber-l);color:var(--amber);}
.bv{background:var(--red-l);color:var(--red);}
.bp{background:var(--purple-l);color:var(--purple);}
.ci{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px;}
.ii{background:var(--bg);border-radius:6px;padding:5px 7px;}
.il{color:var(--muted);font-size:10px;margin-bottom:1px;}
.iv{color:var(--text);line-height:1.3;}
.iv.hi{color:var(--teal);font-weight:500;}
.cw{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;}
.wt{font-size:10px;padding:2px 6px;border-radius:4px;}
.wy{background:#FCEBEB;color:#A32D2D;}
.wp{background:#EEEDFE;color:#534AB7;}
.wl{background:#FAEEDA;color:#BA7517;}
.wr{background:#E6F1FB;color:#185FA5;}
.cf{font-size:10px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--bg);}
#mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
#mb.open{display:flex;}
#mo{background:var(--surface);border-radius:14px;width:100%;max-width:780px;margin:auto;}
#moh{padding:18px 22px 14px;border-bottom:1px solid var(--gray-b);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
#mon{font-size:18px;font-weight:700;}
#mos{font-size:12px;color:var(--muted);margin-top:2px;}
#moc{background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#moc:hover{background:var(--gray-b);}
#mob{padding:18px 22px;}
.ms{margin-bottom:14px;}
.ms:last-child{margin-bottom:0;}
.mt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.mc{font-size:13px;color:var(--text);line-height:1.6;background:var(--bg);border-radius:7px;padding:9px 12px;}
.mc.w{background:var(--red-l);border-left:3px solid var(--red);}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mtag{display:inline-flex;align-items:center;font-size:11px;padding:2px 7px;border-radius:4px;margin:2px;background:var(--red-l);color:var(--red);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.d1{background:var(--teal);}
.d2{background:var(--blue);}
.d3{background:var(--amber);}
.d4{background:var(--purple);}
.d5{background:var(--red);}
@media(max-width:600px){
  #grid{grid-template-columns:1fr;padding:10px 12px;}
  #ctrl{padding:8px 12px;}#hdr{padding:14px 12px;}
  .mg2{grid-template-columns:1fr;}#mb{padding:8px;}
}
</style>
</head>

function cardClass(d){
  if(d.cat==="Antibiotics") return "ca";
  const s=d.sub.toLowerCase();
  if(["vasoactive","antiarrhythmic","vasodilator","thrombolytic"].includes(s)) return "cv";
  if(["electrolyte"].includes(s)) return "ce";
  if(["sedative","sedative/anesthetic","neuromuscular blocker"].includes(s)) return "cs";
  return "cn";
}
function badgeClass(d){
  if(d.cat==="Antibiotics") return "ba";
  const s=d.sub.toLowerCase();
  if(["vasoactive","antiarrhythmic","vasodilator","thrombolytic"].includes(s)) return "bv";
  if(["electrolyte"].includes(s)) return "be";
  if(["sedative","sedative/anesthetic","neuromuscular blocker"].includes(s)) return "bp";
  return "bn";
}
function warnTags(d){
  let t="";
  if(d.ys&&d.ys.length) t+=`<span class="wt wy">Y-site ${d.ys.length} รายการ</span>`;
  if(d.pg&&!["","-","NA"].includes(d.pg)) t+=`<span class="wt wp">Preg Cat ${d.pg}</span>`;
  if(d.wn&&d.wn.includes("light")) t+=`<span class="wt wl">ป้องกันแสง</span>`;
  if(d.wn&&d.wn.includes("noRefrig")) t+=`<span class="wt wr">ห้ามแช่เย็น</span>`;
  return t;
}
let activeCat=null,q="";
function filtered(){
  let r=D;
  if(activeCat) r=r.filter(d=>d.cat===activeCat);
  if(q.trim()){const lq=q.toLowerCase();r=r.filter(d=>[d.name,d.sub,d.form,d.dl,d.nt,d.ad].some(x=>x&&x.toLowerCase().includes(lq)));}
  return r;
}
function render(){
  const res=filtered();
  const grid=document.getElementById("grid");
  const nores=document.getElementById("nores");
  document.getElementById("cnt").textContent=res.length;
  if(!res.length){nores.style.display="block";grid.innerHTML="";return;}
  nores.style.display="none";
  grid.innerHTML=res.map(d=>`
<div class="dc ${cardClass(d)}" onclick="openModal(${D.indexOf(d)})">
  <div class="ch">
    <div><div class="dn">${d.name}</div><div class="ds">${d.sub}</div></div>
    <span class="bdg ${badgeClass(d)}">${d.cat==="Antibiotics"?d.sub:d.cat}</span>
  </div>
  <div class="ci">
    <div class="ii"><div class="il">การเจือจางยา</div><div class="iv hi">${d.dl.split('\n')[0].substring(0,55)}${d.dl.length>55?'…':''}</div></div>
    <div class="ii"><div class="il">ความคงตัวหลังเจือจาง</div><div class="iv">${(d.sd||'-').split('\n')[0].substring(0,55)}</div></div>
  </div>
  <div class="cf">${d.form.split('\n')[0]}</div>
  <div class="cw">${warnTags(d)}</div>
</div>`).join("");
}
const cf=document.getElementById("cats");
[["ทั้งหมด",null],["Antibiotics","Antibiotics"],["Non-Antibiotic","Non-Antibiotic"]].forEach(([lbl,val])=>{
  const b=document.createElement("button");
  b.className="cb"+(val===null?" on":"");
  b.textContent=lbl;
  b.onclick=()=>{
    document.querySelectorAll(".cb").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");activeCat=val;
    document.getElementById("catlbl").textContent=val||"ทุกหมวดยา";
    render();
  };
  cf.appendChild(b);
});
document.getElementById("si").addEventListener("input",e=>{q=e.target.value;render();});
function openModal(i){
  const d=D[i];
  document.getElementById("mon").textContent=d.name;
  document.getElementById("mos").textContent=`${d.sub} — ${d.form.split('\n')[0]}`;
  const yBlock=d.ys&&d.ys.length?`<div class="ms"><div class="mt"><span class="dot d5"></span>⚠️ Y-site Incompatibility</div><div class="mc w">ห้ามให้ร่วมสาย (Y-site) กับ:<br>${d.ys.map(x=>`<span class="mtag">${x}</span>`).join("")}</div></div>`:"";
  document.getElementById("mob").innerHTML=`
<div class="mg2">
  <div class="ms"><div class="mt"><span class="dot d1"></span>การละลายผงยา (Reconstitution)</div><div class="mc">${(d.rc||'-').replace(/\n/g,"<br>")}</div></div>
  <div class="ms"><div class="mt"><span class="dot d4"></span>ความคงตัวหลังละลาย</div><div class="mc">${(d.sr||'-').replace(/\n/g,"<br>")}</div></div>
</div>
<div class="ms"><div class="mt"><span class="dot d2"></span>การเจือจางยา (Dilution)</div><div class="mc">${d.dl.replace(/\n/g,"<br>")}</div></div>
<div class="ms"><div class="mt"><span class="dot d4"></span>ความคงตัวหลังเจือจางยา</div><div class="mc">${(d.sd||'-').replace(/\n/g,"<br>")}</div></div>
<div class="ms"><div class="mt"><span class="dot d3"></span>การบริหารยา (Administration)</div><div class="mc">${d.ad.replace(/\n/g,"<br>")}</div></div>
${yBlock}
<div class="ms"><div class="mt"><span class="dot d5"></span>หมายเหตุ / ข้อควรระวัง</div><div class="mc ${d.nt.includes('⚠️')?'w':''}">${d.nt.replace(/\n/g,"<br>")}</div></div>`;
  document.getElementById("mb").classList.add("open");document.body.style.overflow="hidden";
}
document.getElementById("moc").onclick=()=>{document.getElementById("mb").classList.remove("open");document.body.style.overflow="";};
document.getElementById("mb").onclick=e=>{if(e.target===document.getElementById("mb")){document.getElementById("mb").classList.remove("open");document.body.style.overflow="";}};
document.addEventListener("keydown",e=>{if(e.key==="Escape"){document.getElementById("mb").classList.remove("open");document.body.style.overflow="";}});
render();
</script>
</body>
